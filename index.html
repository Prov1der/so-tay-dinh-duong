<style>

.login-card h2{margin-bottom:6px;}

.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}

.stat-card{background:var(--paper-raised);border:1px solid var(--line);border-radius:12px;padding:16px 18px;}
.stat-card .n{font-family:'Source Serif 4',serif;font-size:28px;color:var(--teal-900);font-weight:700;}
.stat-card .l{font-size:12px;color:var(--ink-soft);margin-top:2px;}

.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.bar-row .lab{width:220px;font-size:12.5px;color:var(--ink);flex-shrink:0;}
.bar-row .track{flex:1;background:var(--paper);border-radius:6px;height:16px;overflow:hidden;}
.bar-row .fill{height:100%;background:var(--teal-800);border-radius:6px;}
.bar-row .fill.coral{background:var(--coral);}

.bar-row .num{width:34px;text-align:right;font-size:12.5px;font-weight:600;color:var(--teal-900);flex-shrink:0;}

.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(20,30,28,0.45);display:flex;align-items:flex-start;justify-content:center;

<body>
<div id="app"></div>
<div id="toast-root"></div>

<script>
/* =========================================================================
   DATA / SCHEMA
========================================================================= */
const LOAI_DOI_TUONG = ["Người cao tuổi","Trẻ em mồ côi, không nơi nương tựa","Người khuyết tật","Người neo đơn, không có người chăm sóc","Người thuộc hộ nghèo, cận nghèo","Đối tượng khác"];
const BENH_LY = ["Tăng huyết áp","Đái tháo đường","Suy thận","Suy tim","Rối loạn tiêu hóa","Sa sút trí tuệ / Alzheimer","Không có bệnh lý nền"];
const KHA_NANG_AN = ["Tự ăn bình thường","Cần hỗ trợ khi ăn","Ăn qua sonde / ống"];
const MUC_DO_VD = ["Đi lại bình thường","Đi lại hạn chế","Nằm liệt tại chỗ"];
const LOAI_CHE_DO = ["Ăn thường","Ăn mềm / nhuyễn","Ăn lỏng / cháo","Ăn kiêng đường (đái tháo đường)","Ăn giảm đạm / giảm muối (bệnh thận, tim mạch)","Chế độ đặc biệt khác"];

function emptyRecord(){
  return {
    id:null, createdAt:null, updatedAt:null,
    hoTen:"", ngaySinh:"", gioiTinh:"Nam", soHoSo:"", loaiDoiTuong:LOAI_DOI_TUONG[0],
    donVi:"", diaChi:"", nguoiGiamHo:"", sdtGiamHo:"", ngayLapHoSo: todayStr(), canBoLap:"",
    chieuCao:"", canNang:"", benhLyNen:[], khaNangAnUong:KHA_NANG_AN[0], diUngThucPham:"", mucDoVanDong:MUC_DO_VD[0],
    nhuCauNangLuong:"", nhuCauProtein:"", nhuCauNuoc:"", viChatDacBiet:"", ghiChuNhuCau:"",
    soBuaAn:3, loaiCheDoAn:LOAI_CHE_DO[0], thucDonGoiY:"", thucPhamNenDung:"", thucPhamTranhDung:"", ngayTaiDanhGia:"", canBoTheoDoi:"", ghiChuKeHoach:""
  };
}
function todayStr(){ return new Date().toISOString().slice(0,10); }
function fmtDate(d){ if(!d) return "—"; const [y,m,day]=d.split('-'); return day&&m&&y? `${day}/${m}/${y}`:d; }
function calcAge(dob){ if(!dob) return null; const b=new Date(dob), n=new Date(); let a=n.getFullYear()-b.getFullYear(); if(n.getMonth()<b.getMonth()||(n.getMonth()===b.getMonth()&&n.getDate()<b.getDate())) a--; return a; }
function calcBMI(h,w){ h=parseFloat(h); w=parseFloat(w); if(!h||!w) return null; const m=h/100; return +(w/(m*m)).toFixed(1); }
function classifyBMI(bmi){
  if(bmi===null) return {label:"—", cls:""};
  if(bmi<18.5) return {label:"Thiếu cân / Suy dinh dưỡng", cls:"danger"};
  if(bmi<23) return {label:"Bình thường", cls:"ok"};
  if(bmi<25) return {label:"Thừa cân", cls:"warn"};
  return {label:"Béo phì", cls:"danger"};
}
function activityFactor(md){
  if(md===MUC_DO_VD[2]) return 1.2;
  if(md===MUC_DO_VD[1]) return 1.3;
  return 1.5;
}
function suggestNutrition(r){
  const w=parseFloat(r.canNang), h=parseFloat(r.chieuCao), age=calcAge(r.ngaySinh)||65;
  if(!w||!h) return null;
  const isFemale = r.gioiTinh==="Nữ";
  let bee = isFemale ? (10*w+6.25*h-5*age-161) : (10*w+6.25*h-5*age+5);
  let energy = Math.round(bee*activityFactor(r.mucDoVanDong));
  const bmi = calcBMI(h,w);
  let proteinPerKg = 1.0;
  if(bmi!==null && bmi<18.5) proteinPerKg = 1.3;
  if((r.benhLyNen||[]).includes("Suy thận")) proteinPerKg = 0.8;
  let protein = Math.round(w*proteinPerKg);
  let water = Math.round(w*30);
  return {energy, protein, water};
}

/* =========================================================================
   FIREBASE — DÁN CẤU HÌNH FIREBASE CỦA ANH VÀO ĐÂY
   (Firebase Console → Project settings → Your apps → Web app → SDK config)
========================================================================= */
const firebaseConfig = {
  apiKey: "AIzaSyA4maY7WkYelOvaQ-oNsRYBaQ5p52TlS3c",
  authDomain: "sotaydinhduong-2cd4b.firebaseapp.com",
  projectId: "sotaydinhduong-2cd4b",
  storageBucket: "sotaydinhduong-2cd4b.firebasestorage.app",
  messagingSenderId: "124927497182",
  appId: "1:124927497182:web:14179276469db3da20034f",
  measurementId: "G-Y0K9QFE9M3"
};
const FIREBASE_CONFIGURED = firebaseConfig.apiKey && !String(firebaseConfig.apiKey).includes("YOUR_");
let db = null;
let _authPromise = null;
if(FIREBASE_CONFIGURED){
  try{
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
  }catch(e){ console.error("Firebase init error:", e); }
}
function ensureAuth(){
  if(!FIREBASE_CONFIGURED) return Promise.reject(new Error("Firebase chưa được cấu hình."));
  if(!_authPromise){
    _authPromise = new Promise((resolve, reject)=>{
      firebase.auth().onAuthStateChanged(u=>{ if(u) resolve(u); });
      firebase.auth().signInAnonymously().catch(err=>{ console.error("Auth error:", err); reject(err); });
    });
  }
  return _authPromise;
}

/* =========================================================================
   STORAGE (Firestore cho hồ sơ + cài đặt dùng chung; localStorage cho hồ sơ cá nhân cán bộ)
========================================================================= */
async function saveRecord(r){
  await ensureAuth();
  r.updatedAt = new Date().toISOString();
  if(!r.id){ r.id = "HS"+Date.now().toString().slice(-8); r.createdAt = r.updatedAt; }
  await db.collection("records").doc(r.id).set(r);
  return r;
}
async function deleteRecord(id){ await ensureAuth(); await db.collection("records").doc(id).delete(); }
async function listRecords(){
  await ensureAuth();
  const snap = await db.collection("records").get();
  const out = [];
  snap.forEach(doc=> out.push(doc.data()));
  out.sort((a,b)=> (b.updatedAt||"").localeCompare(a.updatedAt||""));
  return out;
}
async function getPin(){
  await ensureAuth();
  try{
    const doc = await db.collection("settings").doc("admin").get();
    return (doc.exists && doc.data().pin) ? doc.data().pin : "2024";
  }catch(e){ return "2024"; }
}
async function setPin(p){ await ensureAuth(); await db.collection("settings").doc("admin").set({pin:p}, {merge:true}); }
async function getStaffProfile(){
  try{ return JSON.parse(localStorage.getItem("staff-profile")||"{}"); }catch(e){ return {}; }
}
async function setStaffProfile(p){ localStorage.setItem("staff-profile", JSON.stringify(p)); }

/* =========================================================================
   APP STATE / ROUTER
========================================================================= */
const app = document.getElementById("app");
let state = { route:"home", wizardStep:1, record: emptyRecord(), adminAuthed:false, adminTab:"overview",
  records:[], filters:{q:"", loai:"", phanloai:""}, editingId:null, modalRecord:null };

function toast(msg){
  const root = document.getElementById("toast-root");
  const t = document.createElement("div"); t.className="toast"; t.textContent=msg;
  root.appendChild(t); setTimeout(()=>t.remove(), 2600);
}
function nav(route){ state.route = route; render(); window.scrollTo(0,0); }

}

const STEP_TITLES = ["Thông tin đối tượng","Đánh giá tình trạng","Nhu cầu dinh dưỡng","Kế hoạch dinh dưỡng"];

function renderWizard(){
  const wrap = document.createElement("div"); wrap.className="wrap-narrow";
  const stepper = document.createElement("div"); stepper.className="stepper";
  STEP_TITLES.forEach((t,i)=>{
    const n=i+1; const d=document.createElement("div");
    d.className="step-dot"+(n===state.wizardStep?" active":n<state.wizardStep?" done":"");
    d.textContent = n+". "+t; stepper.appendChild(d);
  });
  wrap.appendChild(stepper);
  const card = document.createElement("div");
  if(state.wizardStep===1) card.appendChild(renderStep1());
  if(state.wizardStep===2) card.appendChild(renderStep2());
  if(state.wizardStep===3) card.appendChild(renderStep3());
  if(state.wizardStep===4) card.appendChild(renderStep4());
  wrap.appendChild(card);
  return wrap;
}

function fieldHTML(label, inner, opts={}){
  return `<div class="field ${opts.full?'full':''}"><label>${label}${opts.req?' <span class="req">*</span>':''}</label>${inner}${opts.hint?`<div class="hint">${opts.hint}</div>`:""}</div>`;
}
function textInput(id,val,type="text"){ return `<input type="${type}" id="${id}" value="${val? String(val).replace(/"/g,'&quot;'):''}">`; }
function selectInput(id,val,options){ return `<select id="${id}">${options.map(o=>`<option value="${o}" ${o===val?"selected":""}>${o}</option>`).join("")}</select>`; }
function textareaInput(id,val){ return `<textarea id="${id}">${val||""}</textarea>`; }

function stepCard(title, sub, bodyHTML){
  const c = document.createElement("div"); c.className="card";
  c.innerHTML = `<h2>${title}</h2><p class="sub">${sub}</p>${bodyHTML}`;
  return c;
}
function actions(el, {back, next, nextLabel, onBack, onNext}){
  const row = document.createElement("div"); row.className="wizard-actions";
  row.innerHTML = `${back? `<button class="btn btn-ghost">← Quay lại</button>`:`<span></span>`}<button class="btn btn-primary">${nextLabel||"Tiếp tục →"}</button>`;
  const btns = row.querySelectorAll("button");
  if(back){ btns[0].onclick=onBack; btns[1].onclick=onNext; } else { btns[0].onclick=onNext; }
  el.appendChild(row);
}
function errorBox(msg){ const d=document.createElement("div"); d.className="error-box"; d.textContent=msg; return d; }

      ${fieldHTML("Loại đối tượng bảo trợ", selectInput("loaiDoiTuong", r.loaiDoiTuong, LOAI_DOI_TUONG), {req:true,full:true})}
      ${fieldHTML("Đơn vị quản lý / Trung tâm", textInput("donVi", r.donVi))}
      ${fieldHTML("Địa chỉ", textInput("diaChi", r.diaChi))}
      ${fieldHTML("Người giám hộ / liên hệ", textInput("nguoiGiamHo", r.nguoiGiamHo))}
      ${fieldHTML("Số điện thoại liên hệ", textInput("sdtGiamHo", r.sdtGiamHo))}

    collectInto(r, ["hoTen","ngaySinh","gioiTinh","soHoSo","loaiDoiTuong","donVi","diaChi","nguoiGiamHo","sdtGiamHo","ngayLapHoSo","canBoLap"]);

      <div class="field full"><label>Bệnh lý nền</label>

  box.appendChild(stepCard("Đánh giá tình trạng", "Số liệu thể trạng và tình trạng sức khoẻ hiện tại của đối tượng.", body));
  box.querySelectorAll("#chieuCao,#canNang").forEach(inp=> inp.addEventListener("input", ()=>{
    r.chieuCao = box.querySelector("#chieuCao").value; r.canNang = box.querySelector("#canNang").value;

    collectStep2(r,box);

function renderStep3(){
  const r = state.record;
  const box = document.createElement("div");
  const body = `

      <div class="stat-card"><div class="n">${canTai}</div><div class="l">Đến hạn tái đánh giá</div></div>
    </div>
    <div class="card"><h2>Phân bố theo loại đối tượng</h2><p class="sub"></p><div id="bar-loai"></div></div>
    <div class="card"><h2>Phân bố theo tình trạng dinh dưỡng (BMI)</h2><p class="sub"></p><div id="bar-bmi"></div></div>
  `;
  const barLoai = div.querySelector("#bar-loai");
  LOAI_DOI_TUONG.forEach(l=>{
    const n = recs.filter(r=>r.loaiDoiTuong===l).length;
    barLoai.appendChild(barRow(l, n, total));
  });
  const barBmi = div.querySelector("#bar-bmi");
  const cats = [["Thiếu cân / SDD","danger"],["Bình thường","ok2"],["Thừa cân","ochre"],["Béo phì","danger"]];
  const labelsMap = {"Thiếu cân / SDD":r=>{const b=calcBMI(r.chieuCao,r.canNang);return b!==null&&b<18.5;},
    "Bình thường":r=>{const b=calcBMI(r.chieuCao,r.canNang);return b!==null&&b>=18.5&&b<23;},
    "Thừa cân":r=>{const b=calcBMI(r.chieuCao,r.canNang);return b!==null&&b>=23&&b<25;},
    "Béo phì":r=>{const b=calcBMI(r.chieuCao,r.canNang);return b!==null&&b>=25;}};
  cats.forEach(([label,cls])=>{
    const n = recs.filter(labelsMap[label]).length;
    barBmi.appendChild(barRow(label, n, total, cls==="ok2"?"":cls));
  });
  return div;
}
function barRow(label,n,total,clsExtra){
  const pct = total? Math.round(n/total*100):0;
  const row=document.createElement("div"); row.className="bar-row";
  row.innerHTML = `<div class="lab">${label}</div><div class="track"><div class="fill ${clsExtra||''}" style="width:${pct}%"></div></div><div class="num">${n}</div>`;
  return row;
}
function filteredRecords(){
  const f = state.filters;
  return state.records.filter(r=>{
    if(f.q && !(r.hoTen||"").toLowerCase().includes(f.q.toLowerCase())) return false;
    if(f.loai && r.loaiDoiTuong!==f.loai) return false;
    if(f.phanloai){
      const b = calcBMI(r.chieuCao,r.canNang);
      const c = classifyBMI(b).label;
      if(f.phanloai==="Thiếu cân" && !(b!==null&&b<18.5)) return false;
      if(f.phanloai==="Bình thường" && !(b!==null&&b>=18.5&&b<23)) return false;
      if(f.phanloai==="Thừa cân" && !(b!==null&&b>=23&&b<25)) return false;
      if(f.phanloai==="Béo phì" && !(b!==null&&b>=25)) return false;
    }
    return true;
  });
}

function showConfirm(title, message, confirmLabel, onConfirm){
  const bg = document.createElement("div"); bg.className="modal-bg";
  const modal = document.createElement("div"); modal.className="modal"; modal.style.maxWidth="420px";
  modal.innerHTML = `
    <div class="modal-header"><h2 class="serif" style="font-size:18px;">${title}</h2><button class="close-x">✕</button></div>
    <p style="font-size:14px;color:var(--ink-soft);line-height:1.6;">${message}</p>
    <div class="wizard-actions">
      <button class="btn btn-ghost" id="confirm-cancel">Huỷ</button>
      <button class="btn btn-danger" id="confirm-ok">${confirmLabel||"Xác nhận"}</button>
    </div>`;
  bg.appendChild(modal);
  document.body.appendChild(bg);
  const close = ()=>bg.remove();
  modal.querySelector(".close-x").onclick=close;
  modal.querySelector("#confirm-cancel").onclick=close;
  bg.onclick=(e)=>{ if(e.target===bg) close(); };
  modal.querySelector("#confirm-ok").onclick=async ()=>{ close(); await onConfirm(); };
}

  const bmi = calcBMI(r.chieuCao,r.canNang);
  return {

    "Địa chỉ": r.diaChi, "Người giám hộ": r.nguoiGiamHo, "SĐT liên hệ": r.sdtGiamHo, "Ngày lập hồ sơ": fmtDate(r.ngayLapHoSo),

function exportExcel(recs){
  if(!recs.length){ toast("Không có hồ sơ để xuất."); return; }
  const rows = recs.map(recordToRow);
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = Object.keys(rows[0]).map(()=>({wch:20}));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Ho so dinh duong");
  XLSX.writeFile(wb, `ho-so-dinh-duong-${todayStr()}.xlsx`);
  toast("Đã xuất file Excel.");
}

  </div>`;

function exportPDF(recs, title, mode){
  if(!recs.length){ toast("Không có hồ sơ để xuất."); return; }
  const html = mode==="detail" ? recs.map(buildDetailHTML).join('<div style="page-break-after:always;"></div>') : buildSummaryHTML(recs, title);
  const container = document.createElement("div");
  container.style.position="fixed"; container.style.left="-99999px"; container.style.top="0";
  container.style.width="1000px"; container.style.background="#fff"; container.style.padding="28px";
  container.innerHTML = html;
  document.body.appendChild(container);
  toast("Đang tạo file PDF…");
  html2canvas(container, {scale:2, backgroundColor:"#fff"}).then(canvas=>{
    const pdf = new window.jspdf.jsPDF('p','mm','a4');
    const pageWidth=210, pageHeight=297;
    const scaleFactor = canvas.width / pageWidth;
    const pageHeightPx = pageHeight * scaleFactor;
    let renderedHeight = 0; let pageIndex=0;
    while(renderedHeight < canvas.height){
      const sliceHeightPx = Math.min(pageHeightPx, canvas.height - renderedHeight);
      const pageCanvas = document.createElement("canvas");
      pageCanvas.width = canvas.width; pageCanvas.height = sliceHeightPx;
      const ctx = pageCanvas.getContext("2d");
      ctx.drawImage(canvas, 0, renderedHeight, canvas.width, sliceHeightPx, 0, 0, canvas.width, sliceHeightPx);
      const imgData = pageCanvas.toDataURL("image/jpeg", 0.92);
      const sliceHeightMM = sliceHeightPx / scaleFactor;
      if(pageIndex>0) pdf.addPage();
      pdf.addImage(imgData, "JPEG", 0, 0, pageWidth, sliceHeightMM);
      renderedHeight += sliceHeightPx; pageIndex++;
    }
    pdf.save(`${mode==="detail"?"ho-so":"bao-cao-tong-hop"}-${todayStr()}.pdf`);
    document.body.removeChild(container);
    toast("Đã xuất file PDF.");
  }).catch(()=>{ document.body.removeChild(container); toast("Có lỗi khi tạo PDF."); });
}
function exportWord(recs, title, mode){
  if(!recs.length){ toast("Không có hồ sơ để xuất."); return; }
  const bodyHTML = mode==="detail" ? recs.map(buildDetailHTML).join('<br clear=all style="page-break-before:always;">') : buildSummaryHTML(recs, title);
  const html = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
    <head><meta charset="utf-8"><title>${title}</title></head><body>${bodyHTML}</body></html>`;
  const blob = new Blob(['\ufeff', html], {type:"application/msword"});
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = `${mode==="detail"?"ho-so":"bao-cao-tong-hop"}-${todayStr()}.doc`;
  document.body.appendChild(link); link.click(); link.remove();
  toast("Đã xuất file Word.");
}
